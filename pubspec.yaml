name: mytodo
description: MyTodo - a personal planner and journal app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image picking
  image_picker: ^1.1.2

  # Audio recording & playback
  record: ^6.2.0
  just_audio: ^0.10.5

  # Calendar UI
  table_calendar: ^3.1.2

  # Theme persistence
  shared_preferences: ^2.5.4
  provider: ^6.1.2
  uuid: ^4.5.1
  
  # FinPilot AI Core Dependencies
  flutter_riverpod: ^3.2.1
  riverpod: ^3.2.1
  sqflite: ^2.3.0
  sqflite_sqlcipher: ^3.0.0
  path_provider: ^2.1.1
  intl: ^0.20.2
  permission_handler: ^12.0.1
  flutter_background_service: ^5.1.0

  # Phase 5: Notifications & Scheduling
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  path: ^1.9.1
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  confetti: ^0.8.0
  introduction_screen: ^4.0.0
  fl_chart: ^1.1.1
  audioplayers: ^6.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
